<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Ícones -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#8B5CF6" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Manifest e tema -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="msapplication-TileColor" content="#8B5CF6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Viewport para mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Configurações PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EstetixHub" />
    
    <!-- Configurações PWA Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="EstetixHub" />
    
    <!-- SEO -->
    <meta name="description" content="EstetixHub - Sistema completo de gestão para clínicas de estética. Agendamentos, anamnese digital, marketing automatizado e muito mais." />
    <meta name="keywords" content="gestão clínica estética, agendamento online, anamnese digital, software para clínicas" />
    <meta name="author" content="EstetixHub" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://estetixhub.com/" />
    <meta property="og:title" content="EstetixHub - Gestão para Clínicas de Estética" />
    <meta property="og:description" content="Sistema completo de gestão para clínicas de estética" />
    <meta property="og:image" content="https://estetixhub.com/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://estetixhub.com/" />
    <meta property="twitter:title" content="EstetixHub - Gestão para Clínicas de Estética" />
    <meta property="twitter:description" content="Sistema completo de gestão para clínicas de estética" />
    <meta property="twitter:image" content="https://estetixhub.com/twitter-image.jpg" />
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="http://localhost:3000" />
    
    <!-- Título da página -->
    <title>EstetixHub - Gestão para Clínicas de Estética</title>
    
    <!-- Script de registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('✅ Service Worker registrado:', registration.scope);
              
              // Verificar por atualizações
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('🔄 Nova versão detectada:', newWorker);
              });
            })
            .catch(error => {
              console.log('❌ Erro no Service Worker:', error);
            });
        });

        // Verificar conexão
        window.addEventListener('online', () => {
          document.body.classList.remove('offline');
          console.log('📱 Conexão restabelecida');
        });

        window.addEventListener('offline', () => {
          document.body.classList.add('offline');
          console.log('📱 Modo offline ativado');
        });
      }

      // Detectar instalação do PWA
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        console.log('📲 PWA pode ser instalado');
      });

      window.addEventListener('appinstalled', () => {
        console.log('✅ PWA instalado com sucesso');
        window.deferredPrompt = null;
      });
    </script>
    
    <!-- Estilos críticos inline (opcional) -->
    <style>
      /* Evitar flash de conteúdo não estilizado */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        height: 100%;
        width: 100%;
      }
      
      /* Indicador de modo offline */
      body.offline::after {
        content: "📱 Modo offline";
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #F59E0B;
        color: white;
        padding: 8px 16px;
        border-radius: 9999px;
        font-size: 14px;
        font-weight: 500;
        z-index: 9999;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        animation: slideUp 0.3s ease;
      }
      
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translate(-50%, 20px);
        }
        to {
          opacity: 1;
          transform: translate(-50%, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Fallback para navegadores sem suporte a module -->
    <script nomodule>
      console.log('❌ Navegador não suporta ES6 modules');
      window.location = '/unsupported-browser.html';
    </script>
  </body>
</html>
