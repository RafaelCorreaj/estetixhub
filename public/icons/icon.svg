<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal mais sofisticado -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6">
        <animate attributeName="stop-color" values="#8B5CF6;#A78BFA;#8B5CF6" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#F472B6;#EC4899" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <!-- Brilho interno para efeito 3D -->
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Sombra para profundidade -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Fundo com gradiente animado e brilho -->
  <rect width="512" height="512" rx="128" fill="url(#grad)"/>
  <rect width="512" height="512" rx="128" fill="url(#glow)"/>
  
  <!-- Borda sutil para definição -->
  <rect width="512" height="512" rx="128" stroke="white" stroke-opacity="0.15" stroke-width="2" fill="none"/>
  
  <!-- Ícone com sombra e efeitos -->
  <g filter="url(#shadow)">
    <svg x="64" y="64" width="384" height="384" viewBox="0 0 24 24">
      <!-- Brilho interno no ícone -->
      <defs>
        <filter id="iconGlow">
          <feGaussianBlur stdDeviation="1" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      
      <g filter="url(#iconGlow)">
        <!-- Path principal com preenchimento branco e opacidade sutil -->
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" 
              fill="white" fill-opacity="0.95"/>
        
        <!-- Traços com efeito de brilho -->
        <g stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9">
          <path d="M20 3v4"/>
          <path d="M22 5h-4"/>
          <path d="M4 17v2"/>
          <path d="M5 18H3"/>
        </g>
        
        <!-- Segunda camada dos traços para efeito neon -->
        <g stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.4">
          <path d="M20 3v4"/>
          <path d="M22 5h-4"/>
          <path d="M4 17v2"/>
          <path d="M5 18H3"/>
        </g>
      </g>
    </svg>
  </g>
  
  <!-- Partículas de brilho (opcional) -->
  <circle cx="100" cy="100" r="4" fill="white" fill-opacity="0.3">
    <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="120" r="3" fill="white" fill-opacity="0.2">
    <animate attributeName="r" values="3;5;3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>