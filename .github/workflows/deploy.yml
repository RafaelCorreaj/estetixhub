name: Deploy EstetixHub to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Permite rodar manualmente

env:
  DOCKER_HUB_USERNAME: rafaelcorreaj
  EC2_HOST: 3.235.24.227
  EC2_USER: ec2-user
  APP_DIR: /home/ec2-user/apps/estetixhub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build e push do backend
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/estetixhub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Build e push do frontend (com build-arg VITE_API_URL)
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/estetixhub-frontend:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Extrair arquivos do frontend para deploy
      - name: Extract frontend files
        run: |
          docker create --name extract-frontend ${{ secrets.DOCKER_HUB_USERNAME }}/estetixhub-frontend:latest
          docker cp extract-frontend:/usr/share/nginx/html ./frontend-dist
          docker rm extract-frontend
          tar -czf frontend-dist.tar.gz frontend-dist
          echo "✅ Frontend files extracted and compressed"

      # 7. Copiar arquivos para a EC2 via SCP
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "frontend-dist.tar.gz,docker-compose.prod.yml"
          target: "${{ env.APP_DIR }}"
          strip_components: 0

      # 8. Deploy na EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e  # Fail on any error
            
            cd ${{ env.APP_DIR }}
            
            echo "📁 Extracting frontend files..."
            tar -xzf frontend-dist.tar.gz
            
            echo "🔄 Pulling latest images..."
            docker-compose -f docker-compose.prod.yml pull
            
            echo "🚀 Restarting containers..."
            docker-compose -f docker-compose.prod.yml up -d
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deploy completed!"
            
            # Verificar status
            echo "📊 Container status:"
            docker-compose -f docker-compose.prod.yml ps
            
            # Health check
            echo "🏥 Health check..."
            sleep 5
            
            # Backend health
            if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Backend health check passed"
            else
              echo "⚠️ Backend health check failed"
            fi
            
            # Frontend health (via nginx)
            if curl -f http://localhost/health > /dev/null 2>&1; then
              echo "✅ Frontend health check passed"
            else
              echo "⚠️ Frontend health check failed"
            fi

      # 9. Notificação
      - name: Send notification
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deploy successful! App available at http://${{ secrets.EC2_HOST }}"
          else
            echo "❌ Deploy failed!"
          fi